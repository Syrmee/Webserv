# ==============================================================================
# CONFIGURATION OFFICIELLE POUR LE TESTEUR WEBSERV (42)
# ==============================================================================

# SERVEUR PRINCIPAL : Requis pour le testeur standard de 42
server {
    listen 8080;
    host 127.0.0.1;
    server_name localhost;
    
    # Global body size très élevé pour ne pas bloquer les gros transferts du testeur
    client_max_body_size 100000000; 
    error_page 404 /custom_404.html;

    # 1. / doit répondre aux requêtes GET uniquement (Exigence sujet)
    location / {
        allow_methods GET;
        root /tmp/www;
        index index.html;
    }

    # 2. /directory/ configuré pour YoupiBanane
    # Toute requête se terminant par .bla doit exécuter le CGI cgi_test via POST
    location /directory/ {
        allow_methods GET POST;
        root /tmp/www/YoupiBanane; # Ajustez le chemin absolu si nécessaire (/home/...)
        index youpi.bad_extension;
        cgi_extension .bla;
        cgi_path /tmp/www/cgi_test; 
    }

    # Doublon sans le slash final pour éviter les soucis de parsing de certains serveurs
    location /directory {
        allow_methods GET POST;
        root /tmp/www/YoupiBanane;
        index youpi.bad_extension;
        cgi_extension .bla;
        cgi_path /tmp/www/cgi_test;
    }

    # 3. /post_body doit accepter n'importe quoi en POST avec un maxBody strict de 100 octets
    location /post_body {
        allow_methods POST;
        client_max_body_size 100;
        root /tmp/www;
        upload_store /tmp/www;
    }

    # 4. Route dédiée aux téléversements et tests DELETE
    location /upload/ {
        allow_methods GET POST DELETE;
        root /tmp/www/upload;
        upload_store /tmp/www/upload;
    }

    # 5. Route de limitation stricte alternative (courante dans les tests d'évaluation)
    location /limit/ {
        allow_methods POST;
        root /tmp/www;
        client_max_body_size 50;
    }

    # 6. Route pour tester le listing de fichiers (Autoindex)
    location /auto/ {
        allow_methods GET;
        root /tmp/www/auto;
        autoindex on;
    }

    # 7. Route de redirection
    location /redir {
        allow_methods GET;
        root /tmp/www;
        return 301 /;
    }

    # 8. Matrice CGI standard pour les scripts Python optionnels de l'évaluation
    location /cgi-bin/ {
        allow_methods GET POST;
        root /tmp/www/cgi-bin;
        cgi_extension .py;
        cgi_path /usr/bin/python3;
    }
}

# ==============================================================================
# SERVEURS SECONDAIRES : Requis pour valider le Multi-port et le Multi-host
# ==============================================================================

# Test de la séparation par Port (127.0.0.1:8081)
server {
    listen 8081;
    host 127.0.0.1;

    location / {
        allow_methods GET;
        root /tmp/www/port2;
        index index.html;
    }
}

# Test de la séparation par Hôte / IP Alias (127.0.0.2:8080)
server {
    listen 8080;
    host 127.0.0.2;

    location / {
        allow_methods GET;
        root /tmp/www/host2;
        index index.html;
    }
}
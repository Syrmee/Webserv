# eval.conf - Complete 42 Evaluation Configuration Matrix

# Server 1: Main Server Matrix on 127.0.0.1:8080
server {
    listen 8080;
    host 127.0.0.1;
    client_max_body_size 1000000; # Default global max body size (1MB)
    error_page 404 /custom_404.html;

    # Basic Home Route Serving Files
    location / {
        allow_methods GET POST;
        root /tmp/www;
    }

    # Standard Upload Storage Destination Route
    location /upload/ {
        allow_methods GET POST DELETE;
        root /tmp/www/upload;
        upload_store /tmp/www/upload;
    }

    # Client Body Limit Verification Route (Truncated to 50 Bytes)
    location /limit/ {
        allow_methods POST;
        root /tmp/www;
        client_max_body_size 50;
        upload_store /tmp/www;
    }

    # Autoindex Interactive Directory Listing Route
    location /auto/ {
        allow_methods GET;
        root /tmp/www/auto;
        autoindex on;
    }

    # Directory Configuration Index Routing Check Route
    location /index_test/ {
        allow_methods GET;
        root /tmp/www/index_test;
        index my_index.html;
    }

    # HTTP Redirection Gateway Route
    location /redir {
        allow_methods GET;
        root /tmp/www;
        return 301 /index_test/;
    }

    # MANDATORY CGI EXECUTION MATRIX (Required for Issue #6 & #14)
    location /cgi-bin/ {
        allow_methods GET POST;
        root /tmp/www/cgi-bin;
        cgi_extension .py;
        cgi_path /usr/bin/python3; # Set path to your environment's python3 executable
    }
}

# Server 2: Port Multi-Listening Isolation (Testing 127.0.0.1:8081)
server {
    listen 8081;
    host 127.0.0.1;

    location / {
        allow_methods GET;
        root /tmp/www/port2;
        index index.html;
    }
}

# Server 3: Hostname IP Alias Isolation (Testing 127.0.0.2:8080)
server {
    listen 8080;
    host 127.0.0.2;

    location / {
        allow_methods GET;
        root /tmp/www/host2;
        index index.html;
    }
}
